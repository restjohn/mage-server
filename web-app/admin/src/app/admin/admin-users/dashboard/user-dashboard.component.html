<div class="admin-nav-gap">
  <div class="container-fluid">
    <ol class="breadcrumb">
      <li class="active"><i class="fa fa-user"></i> Users</li>
    </ol>
  </div>
</div>

<div class="container bottom-gap-l">
  <div class="page-header">
    <h2 class="page-title">Users</h2>
  </div>

  <div class="table-wrapper mat-elevation-z2">
    <div
      class="integrated-navbar d-flex align-items-center justify-content-between"
    >
      <mage-card-navbar
        [isSearchable]="true"
        [searchPlaceholder]="'Search users...'"
        (searchTermChanged)="onSearchTermChanged($event)"
        (searchCleared)="onSearchCleared()"
      ></mage-card-navbar>

      <div class="button-group">
        <button mat-stroked-button color="primary" (click)="openImportModal()">
          Bulk Upload
        </button>
        <button mat-flat-button class="btn-primary" (click)="createUser()">
          New User
        </button>
      </div>
    </div>

    <div class="table-scroll">
      <table
        mat-table
        [dataSource]="dataSource"
        class="mat-table-even-columns mat-table"
      >
        <ng-container matColumnDef="user">
          <th mat-header-cell *matHeaderCellDef>User</th>
          <td mat-cell *matCellDef="let user">
            <div
              class="d-flex align-items-center pointer"
              (click)="gotoUser(user)"
            >
              <user-avatar
                class="right-gap"
                [user]="user"
                avatar-width="40"
                avatar-height="40"
              ></user-avatar>
              <div>
                <div class="strong">{{ user.displayName }}</div>
                <div class="muted">{{ user.email }}</div>
              </div>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let user">
            <div class="d-flex justify-content-end">
              <button
                mat-button
                color="warn"
                *ngIf="hasUserDeletePermission"
                (click)="deleteUser($event, user)"
              >
                Delete
              </button>
              <button
                mat-button
                color="primary"
                *ngIf="hasUserEditPermission && !user.active"
                (click)="activateUser($event, user)"
              >
                Activate
              </button>
              <button
                mat-button
                color="accent"
                *ngIf="hasUserEditPermission && !user.enabled"
                (click)="enableUser($event, user)"
              >
                Enable
              </button>
              <button
                mat-button
                *ngIf="hasUserEditPermission"
                (click)="editUser($event, user)"
              >
                Edit
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          class="pointer"
        ></tr>
      </table>
    </div>

    <mat-paginator
      [length]="totalUsers"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="pageSizeOptions"
      (page)="onPageChange($event)"
    >
    </mat-paginator>
  </div>
</div>
