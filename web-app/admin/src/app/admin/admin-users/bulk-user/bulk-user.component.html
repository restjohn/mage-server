<div class="bulk-user-import-modal">
  <mat-dialog-content class="modal-body">
    <div class="form-grid">
      <mat-form-field appearance="fill">
        <mat-label>Team</mat-label>
        <mat-select [(ngModel)]="selectedTeam">
          <mat-option *ngFor="let team of teams" [value]="team">
            {{ team.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Role</mat-label>
        <mat-select [(ngModel)]="selectedRole">
          <mat-option *ngFor="let role of roles" [value]="role">
            {{ role.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <div class="file-upload">
        <input
          type="file"
          (change)="onFileChange($event)"
          accept=".csv"
          [disabled]="!selectedRole"
          [matTooltip]="
            !selectedRole
              ? 'Please select at least a role to enable file upload'
              : ''
          "
        />
      </div>
    </div>

    <div class="unmapped" *ngIf="unmappedFields.length">
      <div *ngFor="let field of unmappedFields" class="unmapped-field">
        <mat-icon color="warn">error</mat-icon>
        <span>{{ field.title }} is required but not mapped.</span>
      </div>
    </div>

    <div class="table-wrapper" *ngIf="users.length">
      <table mat-table [dataSource]="users" class="mat-elevation-z1">
        <ng-container matColumnDef="team">
          <th mat-header-cell *matHeaderCellDef>Team</th>
          <td mat-cell *matCellDef="let user">
            {{ user.team?.name }}
          </td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let user">
            {{ user.role?.name }}
          </td>
        </ng-container>

        <ng-container *ngFor="let column of columns" [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef>{{ column }}</th>
          <td mat-cell *matCellDef="let user">{{ user[column] }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </mat-dialog-content>

  <div class="modal-footer">
    <button type="button" class="action-button" (click)="onClose()">
      <i class="fa fa-times"></i> Cancel
    </button>
    <button
      type="submit"
      class="action-button btn-primary"
      (click)="onSubmit()"
      [disabled]="!filename"
      [matTooltip]="!selectedRole ? 'Please select a file for import' : ''"
    >
      <i class="fa fa-save"></i> Import
    </button>
  </div>
</div>
