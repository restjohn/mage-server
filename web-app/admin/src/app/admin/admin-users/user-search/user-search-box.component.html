<div class="user-search-container">
  <div class="input-with-clear">
    <label class="field-label">Point of Contact</label>
    <input
      type="text"
      class="form-input"
      [placeholder]="placeholder"
      [(ngModel)]="userText"
      (ngModelChange)="onUserInput($event)"
    />

    <button
      type="button"
      class="clear-btn"
      *ngIf="userText"
      (click)="clear()"
      aria-label="Clear user search"
    >
      ×
    </button>
    <div class="suggestions" *ngIf="searchResults?.length && userText">
      <div
        class="suggestion-item"
        *ngFor="let u of searchResults"
        (click)="selectUser(u)"
      >
        {{ u.displayName }}
      </div>
    </div>
  </div>
</div>
