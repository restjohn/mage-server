<admin-breadcrumb [breadcrumbs]="breadcrumbs"></admin-breadcrumb>

<div class="container bottom-gap-l">
  <div class="page-header">
    <div class="header-title-section">
      <h2 class="page-title">Map</h2>
      <p class="page-subtitle">
        Configure how users search for locations on mobile and web.
      </p>
    </div>
  </div>

  <div class="details-section single">
    <div class="details-card">
      <div class="details-form">
        <div class="form-row two-col">
          <div class="form-field">
            <label class="field-label">Mobile</label>
            <div class="field-content">
              <div class="helper-text">
                Configure how users search for places on MAGE mobile.
              </div>

              <div class="radio-stack">
                <label class="radio-item" *ngFor="let opt of mobileSearchOptions">
                  <input
                    type="radio"
                    name="mobileSearchType"
                    [value]="opt"
                    [(ngModel)]="mobileSearchType"
                  />
                  <span class="radio-text">{{ opt }}</span>
                </label>
              </div>

              <div class="sub-card" *ngIf="mobileSearchType === 'NOMINATIM'">
                <label class="sub-label">Nominatim URL</label>
                <input
                  class="form-input"
                  type="text"
                  placeholder="https://nominatim.openstreetmap.org"
                  [(ngModel)]="mobileNominatimUrl"
                  required
                />
              </div>
            </div>
          </div>

          <div class="form-field">
            <label class="field-label">Web</label>
            <div class="field-content">
              <div class="helper-text">
                Configure how users search for places on MAGE web.
              </div>

              <div class="radio-stack">
                <label class="radio-item" *ngFor="let opt of webSearchOptions">
                  <input
                    type="radio"
                    name="webSearchType"
                    [value]="opt"
                    [(ngModel)]="webSearchType"
                  />
                  <span class="radio-text">{{ opt }}</span>
                </label>
              </div>

              <div class="sub-card" *ngIf="webSearchType === 'NOMINATIM'">
                <label class="sub-label">Nominatim URL</label>
                <input
                  class="form-input"
                  type="text"
                  placeholder="https://nominatim.openstreetmap.org"
                  [(ngModel)]="webNominatimUrl"
                  required
                />
              </div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="action-button btn-primary" type="button" (click)="save()">
            <i class="fa fa-save"></i>
            Save
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
