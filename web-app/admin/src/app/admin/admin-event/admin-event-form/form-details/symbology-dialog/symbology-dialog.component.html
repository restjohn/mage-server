<h2 mat-dialog-title>
    Symbology
    <span *ngIf="data.primary"> for {{ data.primary }} <span *ngIf="data.variant">{{ data.variant }}</span></span>
</h2>

<mat-dialog-content>
    <div class="symbology-content">
        <!-- Icon Upload Section -->
        <div class="icon-section">
            <h3>Point Icon</h3>
            <div class="icon-upload">
                <div class="icon-preview" *ngIf="iconPreview">
                    <img [src]="iconPreview" alt="Icon preview" />
                </div>
                <div class="icon-preview placeholder" *ngIf="!iconPreview">
                    <i class="fa fa-map-marker"></i>
                </div>
                <input type="file" accept="image/*" (change)="onFileSelected($event)" #fileInput
                    style="display: none" />
                <button mat-raised-button (click)="fileInput.click()">
                    <i class="fa fa-upload"></i> Upload Icon
                </button>
            </div>
        </div>

        <!-- Style Configuration -->
        <div class="style-configuration">
            <!-- Line Style -->
            <div class="style-group">
                <h3>Line Style</h3>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Line Color</mat-label>
                    <input matInput type="color" [(ngModel)]="style.stroke" />
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Line Opacity (0.0 - 1.0)</mat-label>
                    <input matInput type="number" step="0.1" min="0" max="1" [(ngModel)]="style.strokeOpacity"
                        required />
                    <mat-error>Must be between 0.0 and 1.0</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Line Width</mat-label>
                    <input matInput type="number" step="1" min="0" [(ngModel)]="style.strokeWidth" required />
                    <mat-error>Must be greater than 0</mat-error>
                </mat-form-field>
            </div>

            <!-- Fill Style -->
            <div class="style-group">
                <h3>Fill Style</h3>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Fill Color</mat-label>
                    <input matInput type="color" [(ngModel)]="style.fill" />
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Fill Opacity (0.0 - 1.0)</mat-label>
                    <input matInput type="number" step="0.1" min="0" max="1" [(ngModel)]="style.fillOpacity" required />
                    <mat-error>Must be between 0.0 and 1.0</mat-error>
                </mat-form-field>
            </div>
        </div>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSave()">Set Symbology</button>
</mat-dialog-actions>
