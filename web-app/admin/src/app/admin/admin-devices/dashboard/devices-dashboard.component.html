<admin-breadcrumb [breadcrumbs]="breadcrumbs"></admin-breadcrumb>

<div class="container bottom-gap-l">
  <div class="page-header">
    <h2 class="page-title">Devices</h2>
  </div>

  <div class="table-wrapper mat-elevation-z2">
    <div
      class="integrated-navbar d-flex align-items-center justify-content-between"
    >
      <div class="filters d-flex align-items-center">
        <mage-card-navbar
          [isSearchable]="true"
          searchPlaceholder="Search Devices..."
          (searchTermChanged)="onSearchTermChanged($event)"
          (searchCleared)="onSearchCleared()"
        ></mage-card-navbar>

        <mat-form-field appearance="outline" class="ml-3 status-filter">
          <mat-label>Status</mat-label>
          <mat-select
            [(ngModel)]="deviceStatusFilter"
            (selectionChange)="onStatusFilterChange($event.value)"
          >
            <mat-option value="all">All</mat-option>
            <mat-option value="registered">Registered</mat-option>
            <mat-option value="unregistered">Unregistered</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="button-group">
        <button
          *ngIf="hasDeviceCreatePermission"
          mat-flat-button
          color="primary"
          (click)="createDevice()"
        >
          New Device
        </button>
      </div>
    </div>

    <div class="table-scroll" *ngIf="filteredDevices?.length; else noDevices">
      <table
        mat-table
        [dataSource]="filteredDevices"
        class="mat-table-even-columns mat-table"
      >
        <ng-container matColumnDef="device">
          <th mat-header-cell *matHeaderCellDef>Device</th>
          <td mat-cell *matCellDef="let device">
            <div class="d-flex align-items-center pointer">
              <i
                class="icon fa mr-2"
                [ngClass]="iconClass(device)"
                aria-hidden="true"
              ></i>
              <div class="w-100">
                <div class="strong mb-10px">
                  {{ device?.user?.displayName }}
                </div>
                <div
                  [matTooltip]="device.description"
                  [matTooltipDisabled]="
                    !device.description || device.description.length <= numChars
                  "
                  matTooltipClass="mat-tooltip-device-desc"
                  class="w-90"
                >
                  <p class="muted ellipsis">{{ device.userAgent }}</p>
                  <p class="muted ellipsis">{{ device.uid }}</p>
                </div>
              </div>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          class="pointer"
          (click)="gotoDevice(row)"
        ></tr>
      </table>
    </div>

    <ng-template #noDevices>
      <div class="text-center no-event p-4 muted">No devices found.</div>
    </ng-template>

    <div class="pagination">
      <mat-paginator
        [length]="totalDevices"
        [pageSize]="searchOptions.page_size"
        [pageIndex]="searchOptions.page"
        [pageSizeOptions]="pageSizeOptions"
        showFirstLastButtons
        (page)="onPageChange($event)"
      >
      </mat-paginator>
    </div>
  </div>
</div>
