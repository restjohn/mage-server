<admin-breadcrumb [breadcrumbs]="breadcrumbs"></admin-breadcrumb>

<div class="container bottom-gap-l">
  <div class="page-header">
    <h2 class="page-title">Teams</h2>
  </div>

  <div class="table-wrapper mat-elevation-z2">
    <div class="integrated-navbar">
      <mage-card-navbar
        [isSearchable]="true"
        [searchPlaceholder]="'Search teams...'"
        [actionButtons]="actionButtons"
        (searchTermChanged)="onSearchTermChanged($event)"
        (searchCleared)="onSearchCleared()"
      ></mage-card-navbar>
    </div>

    <table
      mat-table
      [class.mat-table]="true"
      [dataSource]="dataSource"
      class="mat-table-even-columns"
    >
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let team">
          <div class="strong">{{ team.name }}</div>
        </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let team">
          <div class="muted description-cell" [title]="team.description">
            {{ team.description }}
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        (click)="gotoTeam(row)"
        class="pointer"
      ></tr>
    </table>
    <mat-paginator
      [length]="totalTeams"
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      (page)="onPageChange($event)"
    >
    </mat-paginator>
  </div>
</div>
