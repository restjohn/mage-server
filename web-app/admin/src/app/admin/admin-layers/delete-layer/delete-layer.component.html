<div class="dialog-modal">
    <div class="dialog-header">
        <div class="warning-icon">
            <i class="fa fa-exclamation-triangle"></i>
        </div>
        <div class="header-content">
            <h2 class="dialog-title">Delete Layer</h2>
            <p class="dialog-subtitle">This action cannot be undone</p>
        </div>
    </div>

    <div class="dialog-content">
        <div class="warning-message">
            <p>Layer <strong>"{{layer.name}}"</strong> will be permanently deleted.</p>
            <p>This will remove all layer information and data. This action <strong>CANNOT</strong> be undone.</p>
        </div>

        <div class="error-message" *ngIf="error">
            <i class="fa fa-exclamation-circle"></i>
            <span>{{error}}</span>
        </div>
    </div>

    <div class="dialog-actions">
        <button class="action-button" (click)="cancel()" [disabled]="deleting">Cancel</button>
        <button class="action-button btn-danger" [disabled]="deleting" (click)="deleteLayer()">
            <i class="fa" [ngClass]="deleting ? 'fa-spinner fa-spin' : 'fa-trash'"></i>
            Delete Layer
        </button>
    </div>
</div>
