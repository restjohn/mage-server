<div
  class="banner banner-header"
  *ngIf="type === 'header' && banner.showHeader"
  [ngStyle]="{
    backgroundColor: banner.headerBackgroundColor,
    color: banner.headerTextColor
  }"
>
  {{ banner.headerText }}
</div>

<div
  class="banner banner-footer"
  *ngIf="type === 'footer' && banner.showFooter"
  [ngStyle]="{
    backgroundColor: banner.footerBackgroundColor,
    color: banner.footerTextColor
  }"
>
  {{ banner.footerText }}
</div>
