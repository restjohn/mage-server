<div class="admin-breadcrumbs mat-elevation-z1">
  <i class="fa fa-calendar"></i>
  <div>
    <span class="admin-breadcrumb"><a ui-sref="admin.events">Events</a></span>
  </div>
  <div>
    <span class="admin-breadcrumb__separator">/</span>
  </div>
  <div ng-if="$ctrl.event.id">
    <span class="admin-breadcrumb admin-breadcrumb--active"
      ><a ui-sref="admin.event({ eventId: $ctrl.event.id })"
        >{{ $ctrl.event.name }}</a
      ></span
    >
  </div>
  <div ng-if="$ctrl.event.id">
    <span class="admin-breadcrumb__separator">/</span>
  </div>
  <div>
    <span class="admin-breadcrumb admin-breadcrumb--active">{{ $ctrl.event.id ? 'Edit' : 'New' }}</span>
  </div>
</div>

<div class="container">
  <div class="row">
    <div class="col-md-12">
      <h2 ng-if="$ctrl.event.id">Edit event: {{$ctrl.event.name}}</h2>
      <h2 ng-if="!$ctrl.event.id">New event</h2>
    </div>
  </div>
  <hr />

  <div class="row">
    <div class="col-md-12" ng-show="$ctrl.event">
      <form ng-submit="$ctrl.saveEvent()" class="form">
        <div class="form-group">
          <label class="control-label">Name</label>
          <input
            class="form-control"
            type="text"
            placeholder="Event name"
            ng-model="$ctrl.event.name"
          />
        </div>
        <div class="form-group">
          <label class="control-label">Description</label>
          <textarea
            class="form-control"
            type="text"
            placeholder="Brief description of the event."
            ng-model="$ctrl.event.description"
          ></textarea>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" ng-model="$ctrl.event.noGeometry" />
            Disable Geometry data for new observations by default
          </label>
        </div>
      </form>

      <div class="clearfix">
        <span class="pull-right">
          <a
            class="btn btn-default"
            ng-class="{'disabled': $ctrl.saving}"
            ng-click="$ctrl.cancel()"
            >Cancel</a
          >
          <a
            class="btn btn-success"
            ng-class="{'disabled': $ctrl.saving}"
            ng-click="$ctrl.saveEvent($ctrl.event)"
            ><i class="fa fa-check"></i> Save</a
          >
        </span>
      </div>

      <div class="alert alert-danger form-group" ng-show="$ctrl.error">
        <strong>{{$ctrl.error.message}}</strong>
        <div ng-if="$ctrl.error.errors">
          <li ng-repeat="(key, value) in $ctrl.error.errors">
            {{value.message}}
          </li>
        </div>
      </div>
    </div>
  </div>
</div>
