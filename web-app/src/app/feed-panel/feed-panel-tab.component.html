<div class="tab">
  <div *ngIf="tab?.iconUrl" class="img" [ngClass]="{'img__active': active}" [ngStyle]="imageStyle"></div>
  <mat-icon *ngIf="tab?.icon" [ngClass]="{'icon__active': active, 'icon': true }" [matTooltip]="tab?.title"
    matTooltipPosition="right">
    {{tab.icon}}
  </mat-icon>
</div>
